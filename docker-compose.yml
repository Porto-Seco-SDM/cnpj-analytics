services:

  postgres:
    image: postgres:18-trixie
    ports:
      - 5433:5432
    volumes:
      - ./data/postgres:/var/lib/postgresql
    environment:
      POSTGRES_PASSWORD: cnpj
      POSTGRES_USER: cnpj
      POSTGRES_DB: cnpj
    healthcheck:
      test: ["CMD-SHELL", "sh -c 'pg_isready -U $${POSTGRES_USER}'"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - 8001:8001
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy

  watcher:
    build:
      context: .
      dockerfile: watcher/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Conexão direta com o postgres (sem socket do Docker). Ver load.sh.
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: cnpj
      PGPASSWORD: cnpj
      # Config do watcher (defaults do watcher.py; ajuste se necessário).
      CNPJ_DB: cnpj_full
      CNPJ_DATA_DIR: /data
      CNPJ_STATE_FILE: /state/state.json
      CHECK_INTERVAL_H: "24"
      LOAD_AFTER_HOUR: "22"
      # Orçamento de RAM da carga (knobs calculados a partir daqui).
      TUNE_RAM_GB: "6"
    volumes:
      # Pasta com os zips da Receita. Ajuste a origem ao caminho real no servidor.
      - ./data:/data
      # Persiste o estado (último mês carregado) entre restarts.
      - watcher_state:/state
    restart: unless-stopped

volumes:
  watcher_state:
